<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fomento.AI - Radar DeepSeek</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <div id="root"></div>

    <script type="text/babel">
        // ==============================================================================
        // ⚙️ A SUA CHAVE DO DEEPSEEK
        // ==============================================================================
        // A chave do DeepSeek começa geralmente com "sk-"
        const DEEPSEEK_API_KEY = "sk-182e4cc3f3d549228a1ab2210f2cb120";

        const { useState } = React;

        function App() {
            const [activeTab, setActiveTab] = useState('busca');
            const [projectText, setProjectText] = useState('');
            const [isSearching, setIsSearching] = useState(false);
            const [aiAnalysis, setAiAnalysis] = useState(null);
            
            const [isGeneratingDoc, setIsGeneratingDoc] = useState(false);
            const [businessCaseDoc, setBusinessCaseDoc] = useState(null);
            const [selectedEditalName, setSelectedEditalName] = useState("");

            // ==============================================================================
            // MOTOR 1: GERADOR DE BUSCAS (DOU + AGÊNCIAS DE FOMENTO COM DEEPSEEK)
            // ==============================================================================
            const analyzeAndGenerateSearches = async () => {
                if (!projectText.trim()) {
                    alert("Por favor, descreva o seu projeto.");
                    return;
                }
                if (!DEEPSEEK_API_KEY || DEEPSEEK_API_KEY === "sk-182e4cc3f3d549228a1ab2210f2cb120") {
                    alert("Por favor, insira a sua chave do DeepSeek no código.");
                    return;
                }

                setIsSearching(true);
                setAiAnalysis(null);

                // Endpoint oficial do DeepSeek (idêntico ao padrão OpenAI)
                const url = "https://api.deepseek.com/chat/completions";

                const systemPrompt = `
                    Atue como um Especialista Lean/Ágil em Captação de Recursos no Brasil.
                    Sua tarefa é criar "Queries" (termos de pesquisa avançada do Google) para encontrar editais abertos para o projeto do usuário.
                    Foque nos locais: Diário Oficial da União (site:in.gov.br), FINEP, CNPq, FAPESP, Sebrae.

                    Retorne EXATAMENTE UM JSON válido com a seguinte estrutura:
                    {
                        "diagnostico": "Um parágrafo resumindo as chances do projeto e quais agências mais se alinham.",
                        "sugestoes_historicas": ["Nome do Edital 1", "Nome do Edital 2"],
                        "buscas_avancadas": [
                            {
                                "agencia": "Agência Alvo",
                                "titulo": "Busca na Agência",
                                "query": "site:dominio.gov.br \\"termo de busca\\" AND \\"palavra chave do projeto\\""
                            }
                        ]
                    }
                    Gere no mínimo 5 buscas focadas nas agências.
                `;

                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${DEEPSEEK_API_KEY}`
                        },
                        body: JSON.stringify({ 
                            model: "deepseek-chat", // Modelo super inteligente e barato
                            response_format: { type: "json_object" }, // Garante que a resposta não quebre o sistema
                            messages: [
                                { role: "system", content: systemPrompt },
                                { role: "user", content: `Projeto: ${projectText}` }
                            ],
                            temperature: 0.3
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (data.error) {
                        alert("Erro do DeepSeek: " + data.error.message);
                        setIsSearching(false);
                        return;
                    }

                    const resultText = data.choices[0].message.content;
                    setAiAnalysis(JSON.parse(resultText));
                    
                } catch (error) {
                    console.error("Erro completo:", error);
                    alert("Houve uma falha ao comunicar com a IA do DeepSeek. Tente novamente.");
                } finally {
                    setIsSearching(false);
                }
            };

            const createGoogleSearchLink = (query) => {
                const encodedQuery = encodeURIComponent(query);
                return `https://www.google.com/search?q=${encodedQuery}&tbs=qdr:m`; 
            };

            // ==============================================================================
            // MOTOR 2: O GERADOR DE BUSINESS CASE (PMI VIA DEEPSEEK)
            // ==============================================================================
            const generateBusinessCase = async (nomeDoEdital) => {
                setIsGeneratingDoc(true);
                setSelectedEditalName(nomeDoEdital);
                setActiveTab('docs');
                setBusinessCaseDoc(null);

                const url = "https://api.deepseek.com/chat/completions";

                const systemPrompt = `
                    Você é um Diretor de Desenvolvimento Profissional e Gestor de Projetos certificado (PMP).
                    Crie um 'Business Case' ágil alinhado ao PMBOK e ao Padrão P5 de Sustentabilidade.
                    
                    ESTRUTURA OBRIGATÓRIA (Use formatação Markdown rigorosa):
                    # Business Case: [Crie um Título Inovador]
                    
                    ## 1. Necessidade de Negócios (Business Need)
                    [Justifique a razão fundamental do projeto]

                    ## 2. Análise da Situação e Alternativas
                    [Qual a dor resolvida e por que esta solução é a ideal?]

                    ## 3. Benefícios Esperados (Incluindo Sustentabilidade P5)
                    [Tangíveis e Intangíveis]

                    ## 4. Principais Riscos e Restrições
                    [Mapeie riscos de alto nível de implantação]

                    ## 5. Estimativa de Orçamento e Cronograma
                    [Como o recurso será aplicado em fases de entregas ágeis]

                    ## 6. Critérios de Sucesso
                    [Métricas claras para encerramento]
                `;

                const userPrompt = `
                    Alvo: Edital "${nomeDoEdital}".
                    Projeto do usuário: "${projectText}"
                `;

                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${DEEPSEEK_API_KEY}`
                        },
                        body: JSON.stringify({ 
                            model: "deepseek-chat",
                            messages: [
                                { role: "system", content: systemPrompt },
                                { role: "user", content: userPrompt }
                            ],
                            temperature: 0.6
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (data.error) {
                        alert("Erro do DeepSeek: " + data.error.message);
                        setIsGeneratingDoc(false);
                        return;
                    }

                    setBusinessCaseDoc(data.choices[0].message.content);
                } catch (error) {
                    setBusinessCaseDoc("Ocorreu um erro ao gerar o documento.");
                } finally {
                    setIsGeneratingDoc(false);
                }
            };

            const copyToClipboard = () => {
                if(businessCaseDoc) {
                    navigator.clipboard.writeText(businessCaseDoc);
                    alert("Copiado com sucesso! Já pode colar no seu editor.");
                }
            };

            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    <aside className="w-full md:w-64 bg-slate-900 text-white flex flex-col">
                        <div className="p-6">
                            <h1 className="text-2xl font-bold flex items-center text-blue-400">
                                <i className="fas fa-radar mr-2"></i> Radar.AI
                            </h1>
                            <p className="text-xs text-slate-400 mt-1">DeepSeek Engine V3</p>
                        </div>
                        <nav className="flex-1 px-4 space-y-2 mt-4">
                            <button onClick={() => setActiveTab('busca')} className={`w-full text-left px-4 py-3 rounded-lg flex items-center transition ${activeTab === 'busca' ? 'bg-blue-600' : 'hover:bg-slate-800'}`}>
                                <i className="fas fa-search w-6"></i> Radares de Busca
                            </button>
                            <button onClick={() => setActiveTab('docs')} className={`w-full text-left px-4 py-3 rounded-lg flex items-center transition ${activeTab === 'docs' ? 'bg-blue-600' : 'hover:bg-slate-800'}`}>
                                <i className="fas fa-file-contract w-6"></i> Gerador PMI
                            </button>
                        </nav>
                    </aside>

                    <main className="flex-1 p-6 md:p-10 overflow-y-auto">
                        
                        {activeTab === 'busca' && (
                            <div className="max-w-5xl mx-auto">
                                <div className="mb-8">
                                    <h2 className="text-3xl font-bold text-slate-800">Radar de Captação</h2>
                                    <p className="text-slate-500 mt-1">Descreva o seu projeto. O <b>DeepSeek</b> criará links de busca instantânea focados no ecossistema brasileiro de fomento.</p>
                                </div>

                                <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 mb-8">
                                    <label className="block text-sm font-bold text-slate-700 mb-2">Qual é o seu projeto ou pesquisa?</label>
                                    <textarea 
                                        rows="5"
                                        value={projectText}
                                        onChange={(e) => setProjectText(e.target.value)}
                                        placeholder="Ex: Estamos criando um software focado em inteligência artificial..."
                                        className="w-full border border-slate-300 rounded-lg p-4 focus:ring-2 focus:ring-blue-500 focus:outline-none mb-4"
                                    ></textarea>
                                    <button 
                                        onClick={analyzeAndGenerateSearches}
                                        disabled={isSearching}
                                        className="w-full md:w-auto bg-slate-900 hover:bg-slate-800 text-white font-bold py-3 px-8 rounded-lg transition-all disabled:opacity-70 flex items-center justify-center"
                                    >
                                        {isSearching ? <i className="fas fa-circle-notch fa-spin mr-2"></i> : <i className="fas fa-magic mr-2"></i>}
                                        {isSearching ? 'O DeepSeek está pensando...' : 'Gerar Buscas (DOU & Agências)'}
                                    </button>
                                </div>

                                {aiAnalysis && (
                                    <div className="space-y-8 animate-in fade-in duration-500">
                                        <div className="bg-blue-50 border border-blue-100 rounded-xl p-6">
                                            <h3 className="font-bold text-blue-900 mb-2"><i className="fas fa-chart-line mr-2"></i>Análise do DeepSeek</h3>
                                            <p className="text-blue-800 text-sm leading-relaxed">{aiAnalysis.diagnostico}</p>
                                        </div>

                                        <div>
                                            <h3 className="text-xl font-bold text-slate-800 mb-4 border-b pb-2">Radares de Busca (Últimos 30 Dias)</h3>
                                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                                {aiAnalysis.buscas_avancadas.map((busca, idx) => {
                                                    let badgeColor = "bg-slate-100 text-slate-700";
                                                    if(busca.agencia.includes("FINEP")) badgeColor = "bg-blue-100 text-blue-700";
                                                    if(busca.agencia.includes("FAPESP")) badgeColor = "bg-green-100 text-green-700";
                                                    if(busca.agencia.includes("CNPq")) badgeColor = "bg-yellow-100 text-yellow-700";
                                                    if(busca.agencia.includes("Sebrae")) badgeColor = "bg-indigo-100 text-indigo-700";
                                                    if(busca.agencia.includes("Diário Oficial")) badgeColor = "bg-red-100 text-red-700";

                                                    return (
                                                        <div key={idx} className="bg-white border border-slate-200 rounded-lg p-5 shadow-sm flex flex-col">
                                                            <div className="mb-2">
                                                                <span className={`text-[10px] font-bold px-2 py-1 rounded-full uppercase tracking-wider ${badgeColor}`}>
                                                                    {busca.agencia}
                                                                </span>
                                                            </div>
                                                            <h4 className="font-bold text-slate-800 mb-2">{busca.titulo}</h4>
                                                            <code className="block bg-slate-50 border border-slate-100 text-[11px] p-2 rounded mb-4 text-slate-500 break-words flex-grow">
                                                                {busca.query}
                                                            </code>
                                                            <a 
                                                                href={createGoogleSearchLink(busca.query)} 
                                                                target="_blank" 
                                                                rel="noopener noreferrer"
                                                                className="block text-center w-full bg-slate-900 hover:bg-blue-600 text-white text-sm font-bold py-2 px-4 rounded transition mt-auto"
                                                            >
                                                                <i className="fas fa-external-link-alt mr-2"></i> Buscar
                                                            </a>
                                                        </div>
                                                    )
                                                })}
                                            </div>
                                        </div>

                                        <div className="bg-white p-6 rounded-xl border border-slate-200">
                                            <h3 className="text-xl font-bold text-slate-800 mb-4 border-b pb-2"><i className="fas fa-file-signature mr-2 text-blue-500"></i>Gerar Business Case (Padrão PMI)</h3>
                                            <div className="flex flex-wrap gap-3">
                                                {aiAnalysis.sugestoes_historicas.map((sugestao, idx) => (
                                                    <button 
                                                        key={idx}
                                                        onClick={() => generateBusinessCase(sugestao)}
                                                        className="bg-slate-50 border border-slate-300 hover:border-blue-500 hover:text-blue-600 text-slate-700 py-2 px-4 rounded-full text-sm font-medium transition"
                                                    >
                                                        Gerar para: {sugestao}
                                                    </button>
                                                ))}
                                                <button 
                                                    onClick={() => {
                                                        const nome = prompt("Qual o nome ou link do Edital que você encontrou nas buscas?");
                                                        if(nome) generateBusinessCase(nome);
                                                    }}
                                                    className="bg-blue-600 text-white py-2 px-4 rounded-full text-sm font-bold transition hover:bg-blue-700"
                                                >
                                                    <i className="fas fa-plus mr-1"></i> Digitar Nome de Outro Edital
                                                </button>
                                            </div>
                                        </div>

                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'docs' && (
                            <div className="max-w-4xl mx-auto h-full flex flex-col">
                                <div className="mb-6">
                                    <h2 className="text-3xl font-bold text-slate-800"><i className="fas fa-file-contract text-blue-600 mr-2"></i> Documentação do Projeto</h2>
                                    <p className="text-slate-500">Business Case estruturado pelo modelo DeepSeek V3.</p>
                                </div>

                                <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden min-h-[500px] flex flex-col">
                                    {isGeneratingDoc ? (
                                        <div className="flex-1 flex flex-col items-center justify-center text-center p-10">
                                            <i className="fas fa-circle-notch fa-spin text-5xl text-blue-600 mb-6"></i>
                                            <h3 className="text-xl font-bold text-slate-800">O DeepSeek está escrevendo o projeto...</h3>
                                        </div>
                                    ) : businessCaseDoc ? (
                                        <>
                                            <div className="bg-slate-50 p-4 border-b border-slate-200 flex justify-between items-center">
                                                <div>
                                                    <span className="text-xs font-bold text-slate-500 uppercase block">Alvo do Documento</span>
                                                    <span className="font-bold text-slate-800">{selectedEditalName}</span>
                                                </div>
                                                <button onClick={copyToClipboard} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-bold flex items-center transition">
                                                    <i className="far fa-copy mr-2"></i> Copiar Texto
                                                </button>
                                            </div>
                                            <div className="p-8 overflow-y-auto">
                                                <div 
                                                    className="prose max-w-none text-slate-800 font-sans"
                                                    dangerouslySetInnerHTML={{ 
                                                        __html: businessCaseDoc.replace(/\n/g, '<br/>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/## (.*?)<br\/>/g, '<h2 class="text-xl font-bold mt-8 mb-4 text-slate-900 border-b pb-2">$1</h2>').replace(/# (.*?)<br\/>/g, '<h1 class="text-2xl font-black mb-6 text-blue-900">$1</h1>')
                                                    }} 
                                                />
                                            </div>
                                        </>
                                    ) : (
                                        <div className="flex-1 flex flex-col items-center justify-center p-10 text-slate-400">
                                            <i className="fas fa-file-signature text-6xl mb-4 opacity-50"></i>
                                            <h3 className="text-xl font-bold text-slate-700">Nenhum documento gerado.</h3>
                                            <p className="mt-2 text-center">Faça uma busca na aba anterior e escolha uma oportunidade para gerar o documento.</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
