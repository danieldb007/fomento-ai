<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fomento.AI - Powered by ChatGPT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <div id="root"></div>

    <script type="text/babel">
        // ==============================================================================
        // ⚙️ CONFIGURAÇÃO (PREENCHA AQUI SUA CHAVE DA OPENAI / CHATGPT)
        // ==============================================================================
        // A chave da OpenAI começa com "sk-..."
        const OPENAI_API_KEY = "COLE_AQUI_A_SUA_CHAVE_DA_OPENAI";

        const { useState } = React;

        function App() {
            const [activeTab, setActiveTab] = useState('busca');
            const [projectText, setProjectText] = useState('');
            const [isSearching, setIsSearching] = useState(false);
            const [foundEdicts, setFoundEdicts] = useState([]);
            
            const [isGeneratingDoc, setIsGeneratingDoc] = useState(false);
            const [businessCaseDoc, setBusinessCaseDoc] = useState(null);
            const [selectedEdict, setSelectedEdict] = useState(null);

            // ==============================================================================
            // MOTOR 1: A BUSCA (Usando ChatGPT - GPT-4o-mini)
            // ==============================================================================
            const searchEdictsWithAI = async () => {
                if (!projectText.trim()) {
                    alert("Descreva seu projeto para que a IA saiba o que buscar.");
                    return;
                }
                if (!OPENAI_API_KEY || OPENAI_API_KEY === "COLE_AQUI_A_SUA_CHAVE_DA_OPENAI") {
                    alert("Por favor, insira sua chave da OpenAI no código-fonte.");
                    return;
                }

                setIsSearching(true);
                setFoundEdicts([]);

                const url = "https://api.openai.com/v1/chat/completions";

                const systemPrompt = `
                    Você é um Especialista em Captação de Recursos e Editais de Fomento no Brasil.
                    Sua tarefa é analisar o projeto do usuário e sugerir 3 a 4 linhas de fomento ou editais brasileiros (ex: FINEP, CNPq, FAPESP, BNDES, SebraeTec) altamente compatíveis.
                    
                    Você DEVE responder EXATAMENTE neste formato JSON:
                    {
                        "editais": [
                            {
                                "title": "Nome da Linha ou Edital",
                                "agency": "Agência",
                                "description": "Breve resumo da aderência",
                                "maxValue": "Valor estimado",
                                "status": "Fluxo Contínuo / Previsão"
                            }
                        ]
                    }
                `;

                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${OPENAI_API_KEY}`
                        },
                        body: JSON.stringify({ 
                            model: "gpt-4o-mini", // Modelo rápido e eficiente do ChatGPT
                            response_format: { type: "json_object" }, // Força a saída em JSON
                            messages: [
                                { role: "system", content: systemPrompt },
                                { role: "user", content: `Projeto: ${projectText}` }
                            ],
                            temperature: 0.3
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (data.error) {
                        alert("Erro da OpenAI: " + data.error.message);
                        setIsSearching(false);
                        return;
                    }

                    const resultText = data.choices[0].message.content;
                    const parsedResult = JSON.parse(resultText);
                    setFoundEdicts(parsedResult.editais || []);
                    
                } catch (error) {
                    console.error("Erro completo:", error);
                    alert("Ocorreu uma falha na ligação com a OpenAI. Verifique o console.");
                } finally {
                    setIsSearching(false);
                }
            };

            // ==============================================================================
            // MOTOR 2: O GERADOR DE BUSINESS CASE (Padrão PMI com ChatGPT)
            // ==============================================================================
            const generateBusinessCase = async (edict) => {
                setIsGeneratingDoc(true);
                setSelectedEdict(edict);
                setActiveTab('docs');
                setBusinessCaseDoc(null);

                const url = "https://api.openai.com/v1/chat/completions";

                const systemPrompt = `
                    Você é um Gerente de Projetos Especialista (PMP) certificado pelo PMI.
                    Sua tarefa é criar um rascunho de 'Business Case' alinhado rigorosamente ao PMBOK e ao Padrão P5 de Sustentabilidade, visando aprovação de recursos.
                `;

                const userPrompt = `
                    DADOS DO EDITAL SUGERIDO:
                    Agência: ${edict.agency}
                    Título: ${edict.title}
                    Teto: ${edict.maxValue}

                    PROJETO DA EMPRESA:
                    ${projectText}

                    ESTRUTURA OBRIGATÓRIA (Use formatação Markdown):
                    # Business Case: [Crie um Título Inovador]
                    **Alvo:** Edital ${edict.title} - ${edict.agency}

                    ## 1. Necessidade de Negócios (Business Need)
                    [Justifique a razão fundamental do projeto baseado na tese do edital]

                    ## 2. Análise da Situação e Alternativas
                    [Qual a dor resolvida? Por que esta solução tecnológica é a melhor?]

                    ## 3. Benefícios Esperados (Incluindo Sustentabilidade P5)
                    [Tangíveis e Intangíveis (Impacto social, governança, ambiental)]

                    ## 4. Principais Riscos e Restrições
                    [Mapeie riscos de alto nível de implantação técnica e de negócio]

                    ## 5. Estimativa de Orçamento e Cronograma
                    [Como o recurso será aplicado em fases do ciclo de vida]

                    ## 6. Critérios de Sucesso
                    [Métricas que provarão o encerramento bem-sucedido]
                `;

                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${OPENAI_API_KEY}`
                        },
                        body: JSON.stringify({ 
                            model: "gpt-4o-mini", // Aqui também usamos o gpt-4o-mini
                            messages: [
                                { role: "system", content: systemPrompt },
                                { role: "user", content: userPrompt }
                            ],
                            temperature: 0.7
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (data.error) {
                        alert("Erro da OpenAI: " + data.error.message);
                        setIsGeneratingDoc(false);
                        return;
                    }

                    setBusinessCaseDoc(data.choices[0].message.content);
                } catch (error) {
                    setBusinessCaseDoc("Ocorreu um erro ao gerar o documento.");
                } finally {
                    setIsGeneratingDoc(false);
                }
            };

            const copyToClipboard = () => {
                if(businessCaseDoc) {
                    navigator.clipboard.writeText(businessCaseDoc);
                    alert("Copiado com sucesso!");
                }
            };

            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    <aside className="w-full md:w-64 bg-slate-900 text-white flex flex-col">
                        <div className="p-6">
                            <h1 className="text-2xl font-bold flex items-center text-emerald-400">
                                <i className="fas fa-brain mr-2"></i> Fomento.AI
                            </h1>
                            <p className="text-xs text-slate-400 mt-1">Powered by ChatGPT</p>
                        </div>
                        <nav className="flex-1 px-4 space-y-2 mt-4">
                            <button onClick={() => setActiveTab('busca')} className={`w-full text-left px-4 py-3 rounded-lg flex items-center transition ${activeTab === 'busca' ? 'bg-emerald-600' : 'hover:bg-slate-800'}`}>
                                <i className="fas fa-search w-6"></i> IA de Sugestão
                            </button>
                            <button onClick={() => setActiveTab('docs')} className={`w-full text-left px-4 py-3 rounded-lg flex items-center transition ${activeTab === 'docs' ? 'bg-emerald-600' : 'hover:bg-slate-800'}`}>
                                <i className="fas fa-file-contract w-6"></i> Projetos PMI
                            </button>
                        </nav>
                    </aside>

                    <main className="flex-1 p-6 md:p-10 overflow-y-auto">
                        
                        {activeTab === 'busca' && (
                            <div className="max-w-4xl mx-auto">
                                <div className="mb-8">
                                    <h2 className="text-3xl font-bold text-slate-800">Motor de Análise via ChatGPT</h2>
                                    <p className="text-slate-500 mt-1">Descreva seu projeto. A Inteligência Artificial da OpenAI irá sugerir as melhores linhas de fomento e editais brasileiros para o seu perfil.</p>
                                </div>

                                <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 mb-8">
                                    <label className="block text-sm font-bold text-slate-700 mb-2">Qual é a sua ideia, pesquisa ou negócio?</label>
                                    <textarea 
                                        rows="5"
                                        value={projectText}
                                        onChange={(e) => setProjectText(e.target.value)}
                                        placeholder="Ex: Estamos desenvolvendo um sistema SaaS B2B na área de saúde..."
                                        className="w-full border border-slate-300 rounded-lg p-4 focus:ring-2 focus:ring-emerald-500 focus:outline-none mb-4"
                                    ></textarea>
                                    <button 
                                        onClick={searchEdictsWithAI}
                                        disabled={isSearching}
                                        className="w-full md:w-auto bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-8 rounded-lg transition-all disabled:opacity-70 flex items-center justify-center"
                                    >
                                        {isSearching ? <i className="fas fa-circle-notch fa-spin mr-2"></i> : <i className="fas fa-robot mr-2"></i>}
                                        {isSearching ? 'A OpenAI está analisando...' : 'Sugerir Editais Compatíveis'}
                                    </button>
                                </div>

                                {foundEdicts.length > 0 && (
                                    <div className="space-y-4">
                                        <h3 className="text-xl font-bold text-slate-800 border-b pb-2">Oportunidades Sugeridas</h3>
                                        {foundEdicts.map((edict, idx) => (
                                            <div key={idx} className="bg-white rounded-xl p-6 shadow-sm border border-slate-200 flex flex-col md:flex-row gap-6">
                                                <div className="md:w-3/4">
                                                    <span className="bg-slate-100 text-slate-600 text-xs font-bold px-3 py-1 rounded-full uppercase mr-2">{edict.agency}</span>
                                                    <span className="text-emerald-600 text-xs font-bold px-3 py-1 bg-emerald-50 rounded-full">{edict.status}</span>
                                                    <h4 className="text-lg font-bold text-slate-900 mt-3 mb-2">{edict.title}</h4>
                                                    <p className="text-slate-600 text-sm">{edict.description}</p>
                                                    <p className="text-sm font-bold text-slate-800 mt-2"><i className="fas fa-coins text-emerald-500 mr-1"></i> Estimativa: {edict.maxValue}</p>
                                                </div>
                                                <div className="md:w-1/4 flex items-center">
                                                    <button 
                                                        onClick={() => generateBusinessCase(edict)}
                                                        className="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-3 rounded-lg text-sm transition"
                                                    >
                                                        Gerar Business Case
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'docs' && (
                            <div className="max-w-4xl mx-auto h-full flex flex-col">
                                <div className="mb-6">
                                    <h2 className="text-3xl font-bold text-slate-800"><i className="fas fa-file-contract text-emerald-600 mr-2"></i> Documentação PMI</h2>
                                    <p className="text-slate-500">Business Case estruturado pelo modelo GPT-4o-mini focado nas normas do PMI e P5.</p>
                                </div>

                                <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden min-h-[500px] flex flex-col">
                                    {isGeneratingDoc ? (
                                        <div className="flex-1 flex flex-col items-center justify-center text-center p-10">
                                            <i className="fas fa-circle-notch fa-spin text-5xl text-emerald-600 mb-6"></i>
                                            <h3 className="text-xl font-bold text-slate-800">O ChatGPT está escrevendo o projeto...</h3>
                                        </div>
                                    ) : businessCaseDoc ? (
                                        <>
                                            <div className="bg-slate-50 p-4 border-b border-slate-200 flex justify-between items-center">
                                                <div>
                                                    <span className="text-xs font-bold text-slate-500 uppercase block">Edital Selecionado</span>
                                                    <span className="font-bold text-slate-800">{selectedEdict?.title}</span>
                                                </div>
                                                <button onClick={copyToClipboard} className="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg font-bold flex items-center transition">
                                                    <i className="far fa-copy mr-2"></i> Copiar Texto
                                                </button>
                                            </div>
                                            <div className="p-8 overflow-y-auto">
                                                <div 
                                                    className="prose max-w-none text-slate-800 font-sans"
                                                    dangerouslySetInnerHTML={{ 
                                                        __html: businessCaseDoc.replace(/\n/g, '<br/>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/## (.*?)<br\/>/g, '<h2 class="text-xl font-bold mt-8 mb-4 text-slate-900 border-b pb-2">$1</h2>').replace(/# (.*?)<br\/>/g, '<h1 class="text-2xl font-black mb-6 text-emerald-900">$1</h1>')
                                                    }} 
                                                />
                                            </div>
                                        </>
                                    ) : (
                                        <div className="flex-1 flex flex-col items-center justify-center p-10 text-slate-400">
                                            <i className="fas fa-file-signature text-6xl mb-4 opacity-50"></i>
                                            <h3 className="text-xl font-bold text-slate-700">Nenhum documento gerado.</h3>
                                            <p className="mt-2 text-center">Faça uma busca na aba anterior e escolha uma oportunidade.</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
