<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fomento.AI Radar DeepSeek</title>
    <script>
        function validateAPIKey(apiKey) {
            // Check if the input field is empty
            if (apiKey.trim() === '') {
                alert('API key cannot be empty.');
                return false;
            }
            return true;
        }
    </script>
</head>
<body>
    <h1>Welcome to Fomento.AI Radar DeepSeek</h1>
    <input type="text" id="apiKey" placeholder="Enter your API Key">
    <button onclick="validateAPIKey(document.getElementById('apiKey').value)">Submit</button>
</body>
</html>
